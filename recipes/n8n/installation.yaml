id: n8n
name: n8n
description: Open-source workflow automation tool for connecting APIs, services, and databases with a visual node-based editor
icon: n8n.svg
version: "2026.03"
category: automation

compose:
  composeFile: "docker-compose.yml"

setup: []

commands:
  start: "docker compose -f ${COMPOSE_FILE} up -d"
  stop: "docker compose -f ${COMPOSE_FILE} down"
  restart: "docker compose -f ${COMPOSE_FILE} restart"
  status: "docker compose -f ${COMPOSE_FILE} ps"
  update: "docker compose -f ${COMPOSE_FILE} pull && docker compose -f ${COMPOSE_FILE} up -d"
  logs: "docker compose -f ${COMPOSE_FILE} logs --tail=100"

defaultPort: 30119

openInBrowser: true

extraUrls:
  - label: "n8n Editor"
    url: "http://localhost:30119"

env:
  N8N_ENCRYPTION_KEY: "{{sullaN8nEncryptionKey}}"

integrations:
  n8n:
    N8N_API_KEY: "{{sullaN8nApiKey}}"
    BASE_URL: "http://localhost:30119"
