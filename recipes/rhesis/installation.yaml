id: rhesis
name: Rhesis AI
description: Open-source LLM testing, evaluation & red-teaming platform — automated test generation, conversation simulation, and 60+ metrics
icon: rhesis.png
version: "1.0.0"
category: ai-ml

compose:
  composeFile: "docker-compose.yml"

setup:
  - name: "Wait for database"
    command: "docker compose -f ${COMPOSE_FILE} exec -T rhesis-postgres pg_isready -U rhesis-user -d rhesis-db"
  - name: "Run database migrations"
    command: "docker compose -f ${COMPOSE_FILE} exec -T rhesis-backend alembic upgrade head"

commands:
  start: "docker compose -f ${COMPOSE_FILE} up -d"
  stop: "docker compose -f ${COMPOSE_FILE} down"
  restart: "docker compose -f ${COMPOSE_FILE} restart"
  status: "docker compose -f ${COMPOSE_FILE} ps"
  update: "docker compose -f ${COMPOSE_FILE} pull && docker compose -f ${COMPOSE_FILE} up -d"
  logs: "docker compose -f ${COMPOSE_FILE} logs --tail=100"

extraUrls:
  - label: "Rhesis Dashboard"
    url: "http://localhost:30360"
  - label: "Rhesis API Docs"
    url: "http://localhost:30361/docs"
