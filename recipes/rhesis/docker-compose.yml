version: '3'

x-common-env: &common-env
  ENVIRONMENT: production
  LOG_LEVEL: INFO
  SQLALCHEMY_DATABASE_URL: postgresql://rhesis-user:{{sullaServicePassword}}@rhesis-postgres:5432/rhesis-db
  SQLALCHEMY_DB_DRIVER: postgresql
  SQLALCHEMY_DB_HOST: rhesis-postgres
  SQLALCHEMY_DB_PORT: "5432"
  SQLALCHEMY_DB_USER: rhesis-user
  SQLALCHEMY_DB_PASS: "{{sullaServicePassword}}"
  SQLALCHEMY_DB_NAME: rhesis-db
  DB_ENCRYPTION_KEY: "{{sullaN8nEncryptionKey}}"
  JWT_SECRET_KEY: "{{sullaN8nEncryptionKey}}"
  SESSION_SECRET_KEY: "{{sullaN8nEncryptionKey}}"
  REDIS_URL: redis://:{{sullaServicePassword}}@rhesis-redis:6379/0
  BROKER_URL: redis://:{{sullaServicePassword}}@rhesis-redis:6379/0
  CELERY_RESULT_BACKEND: redis://:{{sullaServicePassword}}@rhesis-redis:6379/1
  FRONTEND_URL: http://localhost:3000
  BACKEND_URL: http://localhost:8080
  AUTH_EMAIL_PASSWORD_ENABLED: "false"
  AUTH_REGISTRATION_ENABLED: "false"
  OTEL_RHESIS_TELEMETRY_ENABLED: "false"
  RHESIS_CONNECTOR_DISABLED: "true"

services:
  rhesis-postgres:
    image: pgvector/pgvector:pg16
    container_name: rhesis-postgres
    restart: unless-stopped
    ports:
      - '30362:5432'
    volumes:
      - rhesis-postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=rhesis-db
      - POSTGRES_USER=rhesis-user
      - POSTGRES_PASSWORD={{sullaServicePassword}}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rhesis-user -d rhesis-db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rhesis-redis:
    image: redis:7-alpine
    container_name: rhesis-redis
    restart: unless-stopped
    command: redis-server --requirepass {{sullaServicePassword}}
    ports:
      - '30363:6379'
    volumes:
      - rhesis-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "{{sullaServicePassword}}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rhesis-backend:
    image: manugomez95/rhesis-backend:latest
    container_name: backend
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      <<: *common-env
    depends_on:
      rhesis-postgres:
        condition: service_healthy
      rhesis-redis:
        condition: service_healthy

  rhesis-worker:
    image: manugomez95/rhesis-worker:latest
    container_name: rhesis-worker
    restart: unless-stopped
    environment:
      <<: *common-env
    depends_on:
      rhesis-postgres:
        condition: service_healthy
      rhesis-redis:
        condition: service_healthy

  rhesis-frontend:
    image: manugomez95/rhesis-frontend:latest
    container_name: rhesis-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET={{sullaN8nEncryptionKey}}
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - BACKEND_URL=http://localhost:8080
    depends_on:
      - rhesis-backend

volumes:
  rhesis-postgres-data:
  rhesis-redis-data:
