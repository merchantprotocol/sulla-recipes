    com.docker.extension.detailed-description: Programmatic video editor for teams that want AI-powered screencasts and captioned MP4s on their own hardware.<br><br><strong>Sulla Video Editor</strong> is a self-hosted video production stack that pairs Whisper transcription with Wav2Vec2 forced alignment, then renders React-driven compositions to MP4 using Puppeteer + FFmpeg. Drop a raw screen capture into the inbox and it comes out the other side as a titled, captioned, frame-accurate video.<br><br><strong>Features:</strong><ul><li>Whisper large-v3-turbo transcription (bundled 1.5 GB model)</li><li>Wav2Vec2 forced alignment for word-level timestamps</li><li>Puppeteer + FFmpeg server-side rendering</li><li>React-based composition templates (video-as-code)</li><li>Capture inbox → auto-process pipeline</li><li>Postgres-backed project state</li><li>REST API for Sulla routines to call</li><li>Fully self-hosted — no data leaves your machine</li></ul><br><strong>Requirements:</strong><ul><li>Sulla Desktop v1.0.0+</li><li>8GB+ RAM recommended (transcription is memory-hungry)</li><li>10GB+ free disk space</li><li>Port 30360 available</li></ul>
